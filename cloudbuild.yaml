steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/civic-pulse:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/civic-pulse:latest', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civic-pulse:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civic-pulse:latest']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civic-pulse'
      - '--image'
      - 'gcr.io/$PROJECT_ID/civic-pulse:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/civic-pulse:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/civic-pulse:latest'

options:
  logging: CLOUD_LOGGING_ONLY
