server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Global try_files for SPA support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets handling
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        # Ensure that missing JS/CSS files return a 404 and NOT index.html
        # This prevents "MIME type mismatch" errors in the browser.
        try_files $uri =404;
    }

    # Caching for images and common static files
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|json|js|css)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
